name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open a PR with...
        2. PR Guardian comments...
        3. Expected behavior...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: installation
    attributes:
      label: Installation Mode
      options:
        - GitHub Action
        - GitHub App
        - Self-hosted
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Your .pr-guardian.yml (if relevant)
      render: yaml
