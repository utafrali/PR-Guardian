name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature!

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you've considered?

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - AI Review
        - Template Check
        - Test Coverage
        - Auto-Labeling
        - Welcome Message
        - Configuration
        - Integration
        - Other
    validations:
      required: true
